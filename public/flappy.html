<html lang="id">

<title>🐦 Fluffy Bird - Belajar Informatika!</title>
<style>

  :root {
    --sky: #87CEEB;
    --sky-dark: #5BA3CC;
    --ground: #8B6914;
    --grass: #5CB85C;
    --pipe: #2ECC40;
    --pipe-dark: #1a7a26;
    --yellow: #FFD700;
    --orange: #FF8C00;
    --red: #FF4136;
    --white: #FFFEF0;
    --purple: #9B59B6;
    --pink: #FF69B4;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Nunito', sans-serif;
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
  }

  #gameWrapper {
    position: relative;
    width: 400px;
    height: 600px;
  }

  canvas {
    display: block;
    border-radius: 20px;

  }

  /* OVERLAY SCREENS */
  .screen {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    border-radius: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 20px;
    transition: opacity 0.3s;
  }

  .screen.hidden { display: none; }

  /* START SCREEN */
  #startScreen {
    background: linear-gradient(180deg, #87CEEB 0%, #98D8F0 50%, #5CB85C 100%);
  }

  #startScreen h1 {
    font-family: 'Fredoka One', cursive;
    font-size: 48px;
    color: var(--white);
    text-shadow: 3px 3px 0 #FF8C00, 6px 6px 0 rgba(0,0,0,0.2);
    margin-bottom: 5px;
    animation: bounce 1s infinite alternate;
  }

  #startScreen .subtitle {
    font-size: 14px;
    color: #2c5f2e;
    font-weight: 700;
    background: rgba(255,255,255,0.7);

    border-radius: 20px;
    margin-bottom: 20px;
  }

  .bird-preview {
    font-size: 80px;
    animation: float 2s ease-in-out infinite;
    margin-bottom: 15px;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.2));
  }

    background: linear-gradient(135deg, var(--yellow), var(--orange));

    font-size: 24px;
    color: white;

    transform: translateY(0);

  }

  .instructions {

    font-size: 13px;
    color: #2c5f2e;
    font-weight: 600;
  }

  /* QUIZ SCREEN */

  }

  .quiz-header {
    font-family: 'Fredoka One', cursive;
    font-size: 22px;
    color: var(--yellow);
    text-shadow: 2px 2px 0 var(--orange);

    width: 3px;
    height: 3px;

// ======== GAME ENGINE ========
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = 400, H = 600;

let gameState = 'start'; // start, playing, quiz, dead
let score = 0;
let bestScore = parseInt(localStorage.getItem('fluffyBest') || '0');
let currentQuestion = null;
let questionAnswered = false;
let usedQuestions = [];
let savedBirdY = 0;
let savedPipes = [];
let savedScore = 0;

// Bird
const bird = {
  x: 80, y: 250, vy: 0,
  w: 40, h: 34,
  gravity: 0.5, flapPower: -9,
  rotation: 0,
  flapAnim: 0,
  reset() {
    this.x = 80; this.y = 250; this.vy = 0; this.rotation = 0;
  }
};

const pipes = [];

const PIPE_GAP = 160;
const PIPE_SPEED = 3;

const clouds = [
  { x: 100, y: 80, s: 1.0 },
  { x: 250, y: 50, s: 0.7 },
  { x: 350, y: 120, s: 0.9 },
];

// Ground
const GROUND_Y = 540;
const GROUND_H = 60;

// ======== DRAWING FUNCTIONS ========
function drawBackground() {
  // Sky gradient
  const skyGrad = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
  skyGrad.addColorStop(0, '#87CEEB');
  skyGrad.addColorStop(0.6, '#B0E0FF');
  skyGrad.addColorStop(1, '#C8F0C8');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, W, GROUND_Y);
}

function drawCloud(x, y, scale) {
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(scale, scale);
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  ctx.beginPath();
  ctx.arc(0, 0, 25, 0, Math.PI * 2);
  ctx.arc(28, -5, 30, 0, Math.PI * 2);
  ctx.arc(55, 0, 22, 0, Math.PI * 2);
  ctx.arc(15, 10, 22, 0, Math.PI * 2);
  ctx.arc(42, 10, 22, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function drawClouds() {
  clouds.forEach(c => {
    c.x -= 0.5;
    if (c.x < -100) c.x = W + 100;
    drawCloud(c.x, c.y, c.s);
  });
}

function drawGround() {
  // Ground base
  const gGrad = ctx.createLinearGradient(0, GROUND_Y, 0, H);
  gGrad.addColorStop(0, '#8B6914');
  gGrad.addColorStop(1, '#6B4F10');
  ctx.fillStyle = gGrad;
  ctx.fillRect(0, GROUND_Y + 18, W, GROUND_H);

  // Grass
  ctx.fillStyle = '#5CB85C';
  ctx.fillRect(0, GROUND_Y, W, 22);

  // Grass detail
  ctx.fillStyle = '#4CAF50';
  for (let i = 0; i < W; i += 15) {
    ctx.beginPath();
    ctx.moveTo(i, GROUND_Y + 22);
    ctx.lineTo(i + 7, GROUND_Y);
    ctx.lineTo(i + 14, GROUND_Y + 22);
    ctx.fill();
  }
}

function drawPipe(x, topH, botY) {
  const capH = 25, capW = PIPE_W + 12;

  // Top pipe body
  const topGrad = ctx.createLinearGradient(x, 0, x + PIPE_W, 0);
  topGrad.addColorStop(0, '#2ECC40');
  topGrad.addColorStop(0.4, '#5EE86A');
  topGrad.addColorStop(1, '#1a7a26');
  ctx.fillStyle = topGrad;
  roundRect(ctx, x, 0, PIPE_W, topH, [0, 0, 8, 8]);
  ctx.fill();

  // Top pipe cap
  ctx.fillStyle = '#27AE34';
  roundRect(ctx, x - 6, topH - capH, capW, capH, [8, 8, 8, 8]);
  ctx.fill();
  ctx.fillStyle = '#4EDE5A';
  ctx.fillRect(x - 4, topH - capH + 4, 12, capH - 8);

  // Bottom pipe body
  ctx.fillStyle = topGrad;
  roundRect(ctx, x, botY, PIPE_W, H - botY, [8, 8, 0, 0]);
  ctx.fill();

  // Bottom pipe cap
  ctx.fillStyle = '#27AE34';
  roundRect(ctx, x - 6, botY, capW, capH, [8, 8, 8, 8]);
  ctx.fill();
  ctx.fillStyle = '#4EDE5A';
  ctx.fillRect(x - 4, botY + 4, 12, capH - 8);
}

function roundRect(ctx, x, y, w, h, radii) {
  const [tl, tr, br, bl] = radii;
  ctx.beginPath();
  ctx.moveTo(x + tl, y);
  ctx.lineTo(x + w - tr, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + tr);
  ctx.lineTo(x + w, y + h - br);
  ctx.quadraticCurveTo(x + w, y + h, x + w - br, y + h);
  ctx.lineTo(x + bl, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - bl);
  ctx.lineTo(x, y + tl);
  ctx.quadraticCurveTo(x, y, x + tl, y);
  ctx.closePath();
}

function drawBird() {
  ctx.save();
  ctx.translate(bird.x + bird.w / 2, bird.y + bird.h / 2);
  ctx.rotate(bird.rotation * Math.PI / 180);

  // Body
  ctx.fillStyle = '#FFD700';
  ctx.beginPath();
  ctx.ellipse(0, 0, 18, 15, 0, 0, Math.PI * 2);
  ctx.fill();

  // Wing (animated)
  bird.flapAnim += 0.3;
  const wingY = Math.sin(bird.flapAnim) * 6;
  ctx.fillStyle = '#FFA500';
  ctx.beginPath();
  ctx.ellipse(-8, -2 + wingY, 10, 6, -0.4, 0, Math.PI * 2);
  ctx.fill();

  // Belly
  ctx.fillStyle = '#FFF3B0';
  ctx.beginPath();
  ctx.ellipse(3, 3, 10, 8, 0, 0, Math.PI * 2);
  ctx.fill();

  // Eye white
  ctx.fillStyle = 'white';
  ctx.beginPath();
  ctx.arc(8, -4, 7, 0, Math.PI * 2);
  ctx.fill();

  // Eye pupil
  ctx.fillStyle = '#1a1a1a';
  ctx.beginPath();
  ctx.arc(10, -4, 4, 0, Math.PI * 2);
  ctx.fill();

  // Eye shine
  ctx.fillStyle = 'white';
  ctx.beginPath();
  ctx.arc(11, -5, 1.5, 0, Math.PI * 2);
  ctx.fill();

  // Beak
  ctx.fillStyle = '#FF6B00';
  ctx.beginPath();
  ctx.moveTo(15, -2);
  ctx.lineTo(24, 0);
  ctx.lineTo(15, 4);
  ctx.closePath();
  ctx.fill();

  // Cheek blush
  ctx.fillStyle = 'rgba(255,150,150,0.5)';
  ctx.beginPath();
  ctx.ellipse(4, 2, 5, 3.5, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

function drawScore() {
  ctx.save();
  ctx.font = 'bold 36px "Fredoka One", cursive';
  ctx.fillStyle = 'white';
  ctx.strokeStyle = 'rgba(0,0,0,0.4)';
  ctx.lineWidth = 4;
  ctx.textAlign = 'center';
  ctx.strokeText(score, W / 2, 70);
  ctx.fillText(score, W / 2, 70);
  ctx.restore();
}

// ======== GAME LOGIC ========
function flap() {
  if (gameState !== 'playing') return;
  bird.vy = bird.flapPower;
}

function spawnPipe() {
  const minTop = 80, maxTop = GROUND_Y - PIPE_GAP - 80;
  const topH = Math.random() * (maxTop - minTop) + minTop;
  pipes.push({ x: W, topH, botY: topH + PIPE_GAP, scored: false });
}

function checkCollision() {
  const bx = bird.x + 5, by = bird.y + 5, bw = bird.w - 10, bh = bird.h - 10;

  if (bird.y + bird.h >= GROUND_Y || bird.y <= 0) return true;

  for (const p of pipes) {
    const capW = PIPE_W + 12;
    const capX = p.x - 6;
    if (bx + bw > capX && bx < capX + capW) {
      if (by < p.topH || by + bh > p.botY) return true;
    }
  }
  return false;
}

function saveGameState() {
  savedBirdY = bird.y;
  savedScore = score;
  savedPipes = pipes.map(p => ({ ...p }));
}

function restoreGameState() {
  bird.y = savedBirdY;
  bird.vy = -3;
  score = savedScore;
  pipes.length = 0;
  savedPipes.forEach(p => pipes.push({ ...p }));
}

function getRandomQuestion() {
  if (usedQuestions.length >= quizBank.length) usedQuestions = [];
  let pool = quizBank.filter((_, i) => !usedQuestions.includes(i));
  const idx = Math.floor(Math.random() * pool.length);
  const origIdx = quizBank.indexOf(pool[idx]);
  usedQuestions.push(origIdx);
  currentQuestion = { ...pool[idx] };
}

function showQuiz() {
  gameState = 'quiz';
  questionAnswered = false;

  getRandomQuestion();

  document.getElementById('quizScore').textContent = score;
  document.getElementById('quizBest').textContent = bestScore;
  document.getElementById('questionCategory').textContent = currentQuestion.cat;
  document.getElementById('questionText').textContent = currentQuestion.q;

  const grid = document.getElementById('optionsGrid');
  grid.innerHTML = '';

  const labels = ['A', 'B', 'C', 'D'];
  currentQuestion.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.textContent = `${labels[i]}. ${opt}`;
    btn.onclick = () => answerQuestion(i, btn);
    grid.appendChild(btn);
  });

  document.getElementById('quizFeedback').textContent = '';
  document.getElementById('quizFeedback').className = 'quiz-feedback';
  document.getElementById('continueBtn').style.display = 'none';
  document.getElementById('restartBtn').style.display = 'none';

  document.getElementById('quizScreen').classList.remove('hidden');
}

function answerQuestion(idx, btn) {
  if (questionAnswered) return;
  questionAnswered = true;

  const buttons = document.querySelectorAll('.option-btn');
  buttons.forEach(b => b.disabled = true);

  const feedback = document.getElementById('quizFeedback');
  const continueBtn = document.getElementById('continueBtn');
  const restartBtn = document.getElementById('restartBtn');

  buttons[currentQuestion.ans].classList.add('correct');

  if (idx === currentQuestion.ans) {
    btn.classList.add('correct');
    feedback.className = 'quiz-feedback correct';
    feedback.textContent = '🎉 Benar! Mantap! Lanjut terbang!';
    continueBtn.style.display = 'block';
    restartBtn.style.display = 'block';
    restartBtn.textContent = '🔄 Mulai Dari Awal';
  } else {
    btn.classList.add('wrong');
    feedback.className = 'quiz-feedback wrong';
    feedback.textContent = `❌ Salah! Jawaban: ${currentQuestion.opts[currentQuestion.ans]}. Coba mulai dari awal ya!`;
    restartBtn.style.display = 'block';
    restartBtn.textContent = '🔄 Mulai Dari Awal';
  }
}

function continueGame() {
  document.getElementById('quizScreen').classList.add('hidden');
  restoreGameState();
  bird.flapAnim = 0;
  gameState = 'playing';
}

function restartGame() {
  document.getElementById('quizScreen').classList.add('hidden');
  bird.reset();
  pipes.length = 0;
  score = 0;
  pipeTimer = 0;
  savedBirdY = bird.y;
  savedPipes = [];
  savedScore = 0;
  gameState = 'playing';
}

// ======== MAIN GAME LOOP ========
let lastTime = 0;
function gameLoop(ts) {
  requestAnimationFrame(gameLoop);

  ctx.clearRect(0, 0, W, H);

  drawBackground();
  drawClouds();

  if (gameState === 'playing') {
    // Update bird
    bird.vy += bird.gravity;
    bird.y += bird.vy;
    bird.rotation = Math.min(Math.max(bird.vy * 3, -25), 70);

    // Update pipes
    pipeTimer++;
    if (pipeTimer >= PIPE_INTERVAL) {
      spawnPipe();
      pipeTimer = 0;
    }

    for (let i = pipes.length - 1; i >= 0; i--) {
      pipes[i].x -= PIPE_SPEED;
      if (!pipes[i].scored && pipes[i].x + PIPE_W < bird.x) {
        pipes[i].scored = true;
        score++;
        document.getElementById('hudScore').textContent = score;
        if (score > bestScore) {
          bestScore = score;
          localStorage.setItem('fluffyBest', bestScore);
          document.getElementById('hudBest').textContent = bestScore;
        }
        // Save state every time we pass a pipe
        saveGameState();
      }
      if (pipes[i].x + PIPE_W + 12 < 0) pipes.splice(i, 1);
    }

    // Check collision
    if (checkCollision()) {
      gameState = 'dead';
      setTimeout(showQuiz, 300);
    }
  }

  // Draw pipes
  pipes.forEach(p => drawPipe(p.x, p.topH, p.botY));

  drawGround();
  drawBird();

  if (gameState === 'playing') drawScore();

  // Animate bird on start screen too
  if (gameState === 'start') {
    bird.y = 250 + Math.sin(Date.now() / 600) * 15;
    bird.rotation = Math.sin(Date.now() / 600) * 10;
    drawBird();
  }
}

// ======== EVENT LISTENERS ========
document.getElementById('startBtn').onclick = () => {
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('hud').style.display = 'flex';
  bird.reset();
  pipes.length = 0;
  score = 0;
  pipeTimer = 0;
  savedBirdY = bird.y;
  document.getElementById('hudScore').textContent = '0';
  document.getElementById('hudBest').textContent = bestScore;
  gameState = 'playing';
};

document.getElementById('continueBtn').onclick = continueGame;
document.getElementById('restartBtn').onclick = restartGame;

canvas.onclick = flap;
document.addEventListener('keydown', e => {
  if (e.code === 'Space') { e.preventDefault(); flap(); }
});
document.addEventListener('touchstart', e => {
  e.preventDefault();
  flap();
}, { passive: false });

// Initial setup
document.getElementById('hud').style.display = 'none';
requestAnimationFrame(gameLoop);
</script>
